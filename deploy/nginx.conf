# ClawMine — Nginx 生产配置
# 用法：
#   sudo cp nginx.conf /etc/nginx/sites-available/clawmine
#   sudo ln -sf /etc/nginx/sites-available/clawmine /etc/nginx/sites-enabled/clawmine
#   sudo certbot --nginx -d api.yourdomain.xyz   # 自动补全 SSL 证书
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name api.CHANGE_ME_DOMAIN;
    return 301 https://$host$request_uri;
}

# HTTPS — API
server {
    listen 443 ssl http2;
    server_name api.CHANGE_ME_DOMAIN;

    # certbot 运行后自动填入：
    # ssl_certificate     /etc/letsencrypt/live/api.CHANGE_ME_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.CHANGE_ME_DOMAIN/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 安全头
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API 反代到 settlement-service
    location ~ ^/(api|health) {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # 限流（每 IP 每秒 20 请求）
        # limit_req zone=api burst=40 nodelay;
    }

    # 如前端部署在同一台机器（否则删除此 location）
    location / {
        root      /opt/clawmine-frontend;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|svg|ico|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

# HTTP — 前端（可选，前端部署在 Vercel 则删除）
server {
    listen 80;
    server_name CHANGE_ME_DOMAIN;
    return 301 https://app.CHANGE_ME_DOMAIN$request_uri;
}
